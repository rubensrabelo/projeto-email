  services:
    postgres:
      image: postgres:17.4
      container_name: ${POSTGRES_CONTAINER}
      restart: always

      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      ports:
        - "${POSTGRES_PORT}:5432"

      volumes:
        - ./data:/var/lib/postgresql/data

      networks:
        - golang-network

  networks:
    golang-network:
      name: golang-network