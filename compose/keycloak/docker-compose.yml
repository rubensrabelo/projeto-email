services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.4
    container_name: ${KEYCLOAK_CONTAINER}
    command: start-dev
    restart: always

    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${POSTGRES_CONTAINER}:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}

      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

    ports:
      - "${KEYCLOAK_PORT}:8080"

    networks:
      - golang-network

networks:
  golang-network:
    external: true